plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "org.jetbrains.kotlin.android"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.5.0"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

def hasKeystore = keystoreProperties.containsKey('storeFile') &&
    file(keystoreProperties['storeFile']).exists()

// 恢复到 36 以满足 androidx.core:core:1.17.0 的要求
def sdkVersion = "36"

def ndkVersion = localProperties.getProperty("flutter.ndkVersion")
if (ndkVersion == null) {
    ndkVersion = "29.0.14206865"
}

android {
    namespace = "com.nxg.openclawproot"
    compileSdk = sdkVersion.toInteger()
    buildToolsVersion = sdkVersion
    ndkVersion = ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId = "com.nxg.openclawproot"
        minSdk = 29
        targetSdk = sdkVersion.toInteger()
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    if (hasKeystore) {
        signingConfigs {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
        release {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }

    packaging {
        resources {
            excludes += '/META-INF/versions/9/OSGI-INF/MANIFEST.MF'
            excludes += '/META-INF/LICENSE*'
            excludes += '/META-INF/NOTICE*'
            excludes += '/META-INF/AL2.0'
            excludes += '/META-INF/LGPL2.1'
        }
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'org.apache.commons:commons-compress:1.26.0'
    implementation 'org.tukaani:xz:1.9'
    implementation 'com.github.luben:zstd-jni:1.5.6-4@aar'
    implementation project(":moduleClawNode")
}

flutter {
    source = "../.."
}
